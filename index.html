<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>FitTrack AI</title>
    <style id="expo-reset">
      html, body { height: 100%; }
      body { overflow: hidden; background: #0F0F1A; }
      #root { display: flex; height: 100%; flex: 1; }
      #err { position:fixed;top:0;left:0;right:0;bottom:0;background:#0F0F1A;color:#FF6584;padding:20px;font-family:monospace;font-size:12px;overflow:auto;display:none;z-index:9999; }
    </style>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var el = document.getElementById('err');
        if (el) { el.style.display='block'; el.textContent = 'ERROR: ' + msg + '\n\nSource: ' + src + ':' + line + '\n\n' + (err && err.stack ? err.stack : ''); }
      };
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('err');
        if (el) { el.style.display='block'; el.textContent = 'PROMISE ERROR: ' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)); }
      });
    </script>
  </head>
  <body>
    <div id="err"></div>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script src="/Fitness-tracker/_expo/static/js/web/AppEntry-525bfa6022268ccb4d795685d7d458c1.js" defer></script>
  </body>
</html>
